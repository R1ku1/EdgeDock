[Rainmeter]
Update=1000
DynamicWindowSize=1
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=[!CommandMeasure MeasureGeo "Update"]

ContextTitle=Edit Location / Settings
ContextAction=["#CURRENTFILE#"]

ContextTitle2=Use Celsius
ContextAction2=[!WriteKeyValue Variables WeatherUnit "celsius" "#CURRENTFILE#"][!Refresh]

ContextTitle3=Use Fahrenheit
ContextAction3=[!WriteKeyValue Variables WeatherUnit "fahrenheit" "#CURRENTFILE#"][!Refresh]

ContextTitle4=Monochrome White Icon
ContextAction4=[!WriteKeyValue Variables IconGreyscale "1" "#CURRENTFILE#"][!WriteKeyValue Variables IconTint "255,255,255" "#CURRENTFILE#"][!Refresh]

ContextTitle5=Full Colour Icon
ContextAction5=[!WriteKeyValue Variables IconGreyscale "0" "#CURRENTFILE#"][!WriteKeyValue Variables IconTint "" "#CURRENTFILE#"][!Refresh]

[Variables]
WeatherLocation=Sydney
WeatherUnit=celsius
IconScale=0.5
IconGreyscale=0
IconTint=255,255,255 
Gap=5
FontBaseSize=36

;===================================================================
; Geocoding
;===================================================================
[MeasureGeo]
Measure=Plugin
Plugin=WebParser
Url=https://geocoding-api.open-meteo.com/v1/search?name=#WeatherLocation#&count=1&language=en&format=json
RegExp=(?si)"latitude":([\-\d.]+),"longitude":([\-\d.]+)
UpdateRate=3600
FinishAction=[!CommandMeasure MeasureRun "Run"]
DynamicVariables=1

[MeasureGeoLat]
Measure=Plugin
Plugin=WebParser
URL=[MeasureGeo]
StringIndex=1

[MeasureGeoLon]
Measure=Plugin
Plugin=WebParser
URL=[MeasureGeo]
StringIndex=2

;===================================================================
; PowerShell script runner
;===================================================================
[MeasureRun]
Measure=Plugin
Plugin=RunCommand
Program=C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#CURRENTPATH#GetWeather.ps1" -lat [&MeasureGeoLat] -lon [&MeasureGeoLon] -unit #WeatherUnit#
State=Hide
OutputType=UTF8
DynamicVariables=1
FinishAction=[!CommandMeasure MeasureDelay "Run"]

;===================================================================
; 1-second delay
;===================================================================
[MeasureDelay]
Measure=Plugin
Plugin=RunCommand
Program=C:\Windows\System32\cmd.exe
Parameter=/c "ping 127.0.0.1 -n 2 >nul"
State=Hide
FinishAction=[!UpdateMeasure MeasureWeatherFile][!UpdateMeter MeterTemp][!UpdateMeter MeterIcon][!Redraw]

;===================================================================
; Read weather.txt
;===================================================================
[MeasureWeatherFile]
Measure=Plugin
Plugin=WebParser
UpdateRate=-1
URL=file://#CURRENTPATH#weather.txt
RegExp=(\d+)\s+(\d+)
StringIndex=1
StringIndex2=2
CodePage=65001
DynamicVariables=1
FinishAction=[!UpdateMeter MeterTemp][!UpdateMeter MeterIcon][!Redraw]

[MeasureTemp]
Measure=Plugin
Plugin=WebParser
URL=[MeasureWeatherFile]
StringIndex=1

[MeasureIcon]
Measure=Plugin
Plugin=WebParser
URL=[MeasureWeatherFile]
StringIndex=2
Substitute=" ":"","\r":"","\n":"","":"3200"

;===================================================================
; Display
;===================================================================
[MeterIcon]
Meter=Image
MeasureName=MeasureIcon
ImageName=WeatherIcons\%1.png
X=0
Y=0
W=(90 * #IconScale#)
PreserveAspectRatio=1
Greyscale=#IconGreyscale#
ImageTint=#IconTint#
DynamicVariables=1

[MeterTemp]
Meter=String
MeasureName=MeasureTemp
X=((90 + #Gap#) * #IconScale#)
Y=(((90 - #FontBaseSize#) / 2) * #IconScale#)
FontFace=Arial
FontSize=(#FontBaseSize# * #IconScale#)
FontColor=255,255,255,255
AntiAlias=1
Text=%1[\x00B0]
DynamicVariables=1

;===================================================================
; Auto-refresh every 30 minutes
;===================================================================
[MeasureTimer]
Measure=Time
UpdateDivider=1800
OnUpdateAction=[!CommandMeasure MeasureRun "Run"]