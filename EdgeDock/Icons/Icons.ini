[Rainmeter]
Update=33
AccurateText=1

[Metadata]
Name=Verticons
Author=Muhammad Abdullah
Information=Auto-hide magnetic dock - generated by generate_dock.py
Version=3.0
License=WTFPL

[Variables]
IconSize=36
IconSizeHover=70
DockX=14
SlideDistance=20
LabelGap=12
FontClr=255,255,255,255
PushAmount=34

[FadeScript]
Measure=Script
ScriptFile=Scripts\Fade.lua

[TweenAppFlowy]
Measure=Script
ScriptFile=Scripts\Tween.lua

[TweenDiscord]
Measure=Script
ScriptFile=Scripts\Tween.lua

[TweenNovelTrackr]
Measure=Script
ScriptFile=Scripts\Tween.lua

[TweenProton]
Measure=Script
ScriptFile=Scripts\Tween.lua

[TweenSteam]
Measure=Script
ScriptFile=Scripts\Tween.lua

[EdgeSensor]
Meter=Image
SolidColor=0,0,0,1
X=0
Y=10
W=12
H=258
MouseOverAction=[!CommandMeasure FadeScript "Show()"]

[HoverZone]
Meter=Image
SolidColor=0,0,0,1
X=0
Y=0
W=204
H=336
MouseOverAction=[!CommandMeasure FadeScript "Show()"]
MouseLeaveAction=[!CommandMeasure FadeScript "Hide()"][!CommandMeasure TweenAppFlowy "Hide()"][!SetOption AppFlowy "Greyscale" "1"][!CommandMeasure TweenDiscord "Hide()"][!SetOption Discord "Greyscale" "1"][!CommandMeasure TweenNovelTrackr "Hide()"][!SetOption NovelTrackr "Greyscale" "1"][!CommandMeasure TweenProton "Hide()"][!SetOption Proton "Greyscale" "1"][!CommandMeasure TweenSteam "Hide()"][!SetOption Steam "Greyscale" "1"]

[EdgeBar]
Meter=Image
SolidColor=255,255,255,140
X=0
Y=15
W=3
H=238

; ============================================================
; AppFlowy
; ============================================================
[AppFlowy]
Meter=Image
W=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenAppFlowy] / 100))
H=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenAppFlowy] / 100))
X=(#DockX# - #SlideDistance# + (#SlideDistance# * [FadeScript] / 255))
Y=20
SolidColor=0,0,0,1
ImageName=assets/appflowy.png
Greyscale=1
ImageAlpha=[FadeScript]
DynamicVariables=1
MouseOverAction=[!CommandMeasure FadeScript "Show()"][!CommandMeasure TweenAppFlowy "Show()"][!SetOption AppFlowy "Greyscale" "0"]
MouseLeaveAction=[!CommandMeasure TweenAppFlowy "Hide()"][!SetOption AppFlowy "Greyscale" "1"]
LeftMouseDownAction=[!CommandMeasure TweenAppFlowy "Punch()"]
LeftMouseUpAction=["C:\Program Files (x86)\AppFlowy\AppFlowy.exe"]

; ============================================================
; Discord
; ============================================================
[Discord]
Meter=Image
W=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenDiscord] / 100))
H=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenDiscord] / 100))
X=(#DockX# - #SlideDistance# + (#SlideDistance# * [FadeScript] / 255))
Y=(68 + #PushAmount# * (([TweenAppFlowy] / 100)))
SolidColor=0,0,0,1
ImageName=assets/discord.png
Greyscale=1
ImageAlpha=[FadeScript]
DynamicVariables=1
MouseOverAction=[!CommandMeasure FadeScript "Show()"][!CommandMeasure TweenDiscord "Show()"][!SetOption Discord "Greyscale" "0"]
MouseLeaveAction=[!CommandMeasure TweenDiscord "Hide()"][!SetOption Discord "Greyscale" "1"]
LeftMouseDownAction=[!CommandMeasure TweenDiscord "Punch()"]
LeftMouseUpAction=["C:\Users\aweso\AppData\Local\Discord\app.ico"]

; ============================================================
; NovelTrackr
; ============================================================
[NovelTrackr]
Meter=Image
W=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenNovelTrackr] / 100))
H=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenNovelTrackr] / 100))
X=(#DockX# - #SlideDistance# + (#SlideDistance# * [FadeScript] / 255))
Y=(116 + #PushAmount# * (([TweenAppFlowy] / 100) + ([TweenDiscord] / 100)))
SolidColor=0,0,0,1
ImageName=assets/ntrackr.png
Greyscale=1
ImageAlpha=[FadeScript]
DynamicVariables=1
MouseOverAction=[!CommandMeasure FadeScript "Show()"][!CommandMeasure TweenNovelTrackr "Show()"][!SetOption NovelTrackr "Greyscale" "0"]
MouseLeaveAction=[!CommandMeasure TweenNovelTrackr "Hide()"][!SetOption NovelTrackr "Greyscale" "1"]
LeftMouseDownAction=[!CommandMeasure TweenNovelTrackr "Punch()"]
LeftMouseUpAction=["C:\Users\aweso\AppData\Local\noveltrackr\noveltrackr.exe"]

; ============================================================
; ProtonVPN
; ============================================================
[Proton]
Meter=Image
W=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenProton] / 100))
H=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenProton] / 100))
X=(#DockX# - #SlideDistance# + (#SlideDistance# * [FadeScript] / 255))
Y=(164 + #PushAmount# * (([TweenAppFlowy] / 100) + ([TweenDiscord] / 100) + ([TweenNovelTrackr] / 100)))
SolidColor=0,0,0,1
ImageName=assets/proton.png
Greyscale=1
ImageAlpha=[FadeScript]
DynamicVariables=1
MouseOverAction=[!CommandMeasure FadeScript "Show()"][!CommandMeasure TweenProton "Show()"][!SetOption Proton "Greyscale" "0"]
MouseLeaveAction=[!CommandMeasure TweenProton "Hide()"][!SetOption Proton "Greyscale" "1"]
LeftMouseDownAction=[!CommandMeasure TweenProton "Punch()"]
LeftMouseUpAction=["C:\Program Files\Proton\VPN\ProtonVPN.Launcher.exe"]

; ============================================================
; Steam
; ============================================================
[Steam]
Meter=Image
W=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenSteam] / 100))
H=(#IconSize# + ((#IconSizeHover# - #IconSize#) * [TweenSteam] / 100))
X=(#DockX# - #SlideDistance# + (#SlideDistance# * [FadeScript] / 255))
Y=(212 + #PushAmount# * (([TweenAppFlowy] / 100) + ([TweenDiscord] / 100) + ([TweenNovelTrackr] / 100) + ([TweenProton] / 100)))
SolidColor=0,0,0,1
ImageName=assets/steam.png
Greyscale=1
ImageAlpha=[FadeScript]
DynamicVariables=1
MouseOverAction=[!CommandMeasure FadeScript "Show()"][!CommandMeasure TweenSteam "Show()"][!SetOption Steam "Greyscale" "0"]
MouseLeaveAction=[!CommandMeasure TweenSteam "Hide()"][!SetOption Steam "Greyscale" "1"]
LeftMouseDownAction=[!CommandMeasure TweenSteam "Punch()"]
LeftMouseUpAction=["C:\Program Files (x86)\Steam\steam.exe"]
